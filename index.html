<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --primary: #4f46e5; --primary-dark: #3730a3;
            --bg: #f8fafc; --white: #ffffff;
            --text: #1e293b; --text-light: #64748b;
            --danger: #dc2626; --success: #16a34a; --warning: #d97706;
            --sidebar-width: 280px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); }

        /* Login Screen */
        .login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%); }
        .login-card { background: white; padding: 50px; border-radius: 20px; width: 420px; box-shadow: var(--shadow); text-align: center; }
        .login-card h1 { color: var(--primary); margin-bottom: 10px; font-size: 2rem; }
        .login-card p { color: var(--text-light); margin-bottom: 30px; }
        .input-box { margin-bottom: 20px; text-align: left; }
        .input-box input { width: 100%; padding: 14px 20px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        .input-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .hint { margin-top: 25px; font-size: 0.85rem; color: var(--text-light); background: #f8fafc; padding: 15px; border-radius: 8px; text-align: left; line-height: 1.8; border: 1px solid #e2e8f0; }

        /* Layout */
        .app-container { display: none; height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: white; height: 100%; position: fixed; box-shadow: 5px 0 15px rgba(0,0,0,0.02); padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #e2e8f0; z-index: 100; }
        .brand { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 35px; display: flex; align-items: center; gap: 10px; }
        .user-card { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: var(--shadow); }
        .user-card .role-tag { font-size: 0.75rem; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px; margin-top: 5px; display: inline-block; }
        
        .nav-item { padding: 14px 20px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; color: var(--text-light); font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: #f1f5f9; color: var(--text); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); }
        
        .logout { margin-top: auto; background: #fef2f2; border: none; color: var(--danger); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .logout:hover { background: #fee2e2; }

        .main-content { margin-left: var(--sidebar-width); padding: 40px; height: 100vh; overflow-y: auto; background: #f1f5f9; }
        
        /* Components */
        .card { background: white; border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); margin-bottom: 25px; border: 1px solid #f1f5f9; }
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
        
        /* Warning Banner */
        .warning-banner { background: linear-gradient(90deg, #fef2f2, #fee2e2); border-left: 5px solid var(--danger); padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; }
        .warning-banner h4 { color: var(--danger); margin-bottom: 5px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: white; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; transition: 0.3s; }
        .stat-box:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .stat-box.primary { background: var(--primary); color: white; border: none; }
        .stat-box.danger { background: var(--danger); color: white; border: none; }
        .stat-box.warning { background: var(--warning); color: white; border: none; }
        .stat-number { font-size: 2.5rem; font-weight: 800; margin: 5px 0; }

        /* Tables */
        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table.att-table { width: 100%; border-collapse: collapse; min-width: 600px; background: white; }
        .att-table th { background: #f8fafc; color: var(--text-light); padding: 14px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .att-table td { padding: 14px; border-bottom: 1px solid #f1f5f9; color: var(--text); }
        .att-table tr:hover { background: #f8fafc; }
        
        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        select, input[type="date"], input[type="text"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: 'Poppins', sans-serif; background: white; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        .btn-action { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.95rem; }
        .btn-action:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); }

        /* Quick Entry Box */
        .quick-entry-box { background: #f8fafc; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 8px; margin-bottom: 20px; }
        .quick-entry-box textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-family: 'Poppins', sans-serif; resize: none; }

        /* --- NEW ATTENDANCE STYLES (TCS INSPIRED) --- */

        /* Top Summary Cards */
        .att-summary-header {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .att-summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.2s;
        }
        .att-summary-card:hover { transform: translateY(-3px); }

        .att-summary-card .label {
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .att-summary-card .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        .att-summary-card.danger .value { color: var(--danger); }
        .att-summary-card.success .value { color: var(--success); }

        /* Enhanced Table Styling */
        .att-table th {
            background: #1e3a8a; /* Darker Blue Header like TCS */
            color: white;
            padding: 16px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .att-table td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        /* Type Badges (Lecture / Practical) */
        .type-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            display: inline-block;
            min-width: 90px;
            text-align: center;
        }
        .type-badge.lec {
            background-color: #dbeafe; /* Light Blue */
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        .type-badge.prac {
            background-color: #fef3c7; /* Light Yellow/Orange */
            color: #92400e;
            border: 1px solid #fde68a;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .att-summary-header {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-screen">
        <div class="login-card">
            <h1>🎓 UniPortal</h1>
            <p>Smart College Management</p>
            <form onsubmit="handleLogin(event)">
                <div class="input-box">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="hint">
                <strong>Admin:</strong> admin / admin123<br>
                <strong>Teacher:</strong> teacher1 / teacher123<br>
                <strong>Student:</strong> student1 / 123
            </div>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="appContainer" class="app-container">
        <nav class="sidebar">
            <div class="brand">🎓 UniPortal</div>
            <div class="user-card">
                <div id="userName" style="font-weight:700; font-size:1.1rem;">Name</div>
                <div id="userRole" class="role-tag">Role</div>
            </div>
            <div id="navMenu"></div>
            <button class="logout" onclick="logout()">Logout</button>
        </nav>

        <main class="main-content" id="mainContent"></main>
    </div>

    <script>
        let currentUser = null;

        // --- LOGIN LOGIC ---
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                startApp();
            } else {
                alert("Invalid Login");
            }
        }

        function startApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userRole').innerText = currentUser.role;
            
            const menu = document.getElementById('navMenu');
            
            if (currentUser.role === 'student') {
                menu.innerHTML = `
                    <div class="nav-item active" onclick="loadPage('dashboard')">🏠 Dashboard</div>
                    <div class="nav-item" onclick="loadPage('timetable')">📅 Class Timetable</div>
                    <div class="nav-item" onclick="loadPage('attendance')">📊 My Attendance</div>`;
                loadPage('dashboard');
            } else {
                menu.innerHTML = `
                    <div class="nav-item active" onclick="loadPage('dashboard')">🏫 Dashboard</div>
                    <div class="nav-item" onclick="loadPage('attendance')">📝 Mark Attendance</div>
                    <div class="nav-item" onclick="loadPage('students')">👥 Student Details</div>
                    <div class="nav-item" onclick="loadPage('shortage')">⚠️ Shortage List</div>`;
                loadPage('dashboard');
            }
        }

        function loadPage(page) {
            const main = document.getElementById('mainContent');
            main.innerHTML = "";
            if (currentUser.role === 'student') loadStudentPage(page);
            else loadAdminPage(page);
        }

        // ==========================================
        // STUDENT LOGIC
        // ==========================================
        async function loadStudentPage(page) {
            // Cache Busting
            const attRes = await fetch(`/api/student/attendance/${currentUser.id}?t=${new Date().getTime()}`);
            const attData = await attRes.json();

            if(page === 'dashboard') {
                document.getElementById('mainContent').innerHTML = `
                    <h1 style="margin-bottom:10px;">Welcome back, ${currentUser.name.split(' ')[0]} 👋</h1>
                    <p style="color:var(--text-light); margin-bottom:25px;">Here is your academic overview.</p>
                    
                    ${attData.overall.semesterPercentage < 75 && attData.overall.total > 0 ? `
                        <div class="warning-banner">
                            <div style="font-size:2.5rem;">🚨</div>
                            <div>
                                <h4>Attendance Shortage Warning!</h4>
                                <p>Your current attendance is <strong>${attData.overall.semesterPercentage}%</strong>. Immediate improvement is required.</p>
                            </div>
                        </div>
                    ` : ''}

                    <div class="stats-grid">
                        <div class="stat-box warning">
                            <div style="font-size:0.9rem; opacity:0.9;">Monthly Attendance</div>
                            <div class="stat-number">${attData.overall.monthlyPercentage}%</div>
                            <div style="font-size:0.8rem">${attData.overall.monthlyPresent}/${attData.overall.monthlyTotal} Classes</div>
                        </div>
                        <div class="stat-box primary">
                            <div style="font-size:0.9rem; opacity:0.9;">Semester Attendance</div>
                            <div class="stat-number">${attData.overall.semesterPercentage}%</div>
                            <div style="font-size:0.8rem">${attData.overall.present}/${attData.overall.total} Classes</div>
                        </div>
                    </div>
                    
                    <div class="card" style="margin-top:20px;">
                        <div class="section-title">Personal Information</div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            <div><strong>Roll No:</strong> ${currentUser.rollNumber}</div>
                            <div><strong>Course:</strong> ${currentUser.course}</div>
                            <div><strong>Mobile:</strong> ${currentUser.mobile}</div>
                            <div><strong>Email:</strong> ${currentUser.email}</div>
                        </div>
                    </div>
                `;
            } else if (page === 'timetable') {
                const res = await fetch(`/api/student/timetable/${currentUser.course}`);
                const schedule = await res.json();
                const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

                let html = `<h1 style="margin-bottom:20px;">Weekly Class Timetable</h1>`;
                html += `<div class="card"><div style="display:grid; gap:15px;">`;
                
                days.forEach(day => {
                    const slots = schedule[day] || [];
                    html += `
                        <div style="background:#f8fafc; padding:15px; border-radius:8px; border-left:4px solid var(--primary);">
                            <h3 style="color:var(--primary); margin-bottom:10px;">${day}</h3>
                            ${slots.length === 0 ? '<div style="color:var(--text-light);">No Classes</div>' : ''}
                            <div style="display:grid; gap:8px;">
                            ${slots.map(s => `
                                <div style="background:white; padding:10px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                                    <div>
                                        <strong style="color:var(--text);">${s.subject}</strong>
                                        <div style="font-size:0.8rem; color:var(--text-light);">${s.time} | ${s.room}</div>
                                    </div>
                                    <span style="background:var(--primary); color:white; padding:2px 8px; border-radius:4px; font-size:0.7rem;">P${s.period}</span>
                                </div>
                            `).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                document.getElementById('mainContent').innerHTML = html;
            
            } else if (page === 'attendance') {
                // --- NEW TCS-STYLE ATTENDANCE DESIGN ---
                
                // Calculations for summary cards
                const total = attData.overall.total;
                const present = attData.overall.present;
                const absent = total - present;
                const percent = attData.overall.semesterPercentage;

                // Helper to guess class type based on subject name
                function getType(subject) {
                    const s = subject.toLowerCase();
                    if (s.includes('lab') || s.includes('practical')) return { text: 'Practical', class: 'prac' };
                    return { text: 'Lecture', class: 'lec' };
                }

                let html = `
                    <h1 style="margin-bottom:20px; font-weight:800; color:var(--text);">My Attendance Statistics</h1>
                    
                    <!-- Top Summary Header -->
                    <div class="att-summary-header">
                        <div class="att-summary-card">
                            <div class="label">Total Classes</div>
                            <div class="value">${total}</div>
                        </div>
                        <div class="att-summary-card success">
                            <div class="label">Attended</div>
                            <div class="value">${present}</div>
                        </div>
                        <div class="att-summary-card danger">
                            <div class="label">Absent</div>
                            <div class="value">${absent}</div>
                        </div>
                        <div class="att-summary-card">
                            <div class="label">Overall %</div>
                            <div class="value" style="color: ${percent < 75 ? 'var(--danger)' : 'var(--primary)'}">${percent}%</div>
                        </div>
                    </div>

                    <!-- Detailed Table -->
                    <div class="card" style="padding:0; border:none; overflow:hidden;">
                        <div class="table-container" style="border:none;">
                            <table class="att-table">
                                <thead>
                                    <tr>
                                        <th>Subject Name</th>
                                        <th>Type</th>
                                        <th style="text-align:center;">Total</th>
                                        <th style="text-align:center;">Present</th>
                                        <th style="text-align:center;">Absent</th>
                                        <th style="text-align:center;">Attendance %</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${attData.subjects.length === 0 
                                        ? '<tr><td colspan="6" style="text-align:center; padding:30px;">No attendance records found.</td></tr>' 
                                        : attData.subjects.map(s => {
                                            const type = getType(s.subject);
                                            const subAbsent = s.total - s.present;
                                            return `
                                            <tr>
                                                <td style="font-weight:600; color:var(--text);">${s.subject}</td>
                                                <td><span class="type-badge ${type.class}">${type.text}</span></td>
                                                <td style="text-align:center; font-weight:600;">${s.total}</td>
                                                <td style="text-align:center; color:var(--success); font-weight:600;">${s.present}</td>
                                                <td style="text-align:center; color:var(--danger); font-weight:600;">${subAbsent}</td>
                                                <td style="text-align:center;">
                                                    <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                                                        <span style="font-weight:700; width:45px;">${s.percentage}%</span>
                                                        <div style="background:#e2e8f0; height:6px; width:60px; border-radius:3px;">
                                                            <div style="background:${s.isShortage ? 'var(--danger)' : 'var(--success)'}; height:100%; width:${s.percentage}%; border-radius:3px;"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                            `;
                                        }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                document.getElementById('mainContent').innerHTML = html;
            }
        }

        // ==========================================
        // ADMIN / TEACHER LOGIC
        // ==========================================
        async function loadAdminPage(page) {
            if (page === 'dashboard') {
                if(currentUser.role === 'teacher') {
                    const res = await fetch('/api/teacher/today', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subjectsAssigned: currentUser.subjects })
                    });
                    const data = await res.json();
                    
                    document.getElementById('mainContent').innerHTML = `
                        <h1 style="margin-bottom:10px;">Today's Schedule</h1>
                        <p style="margin-bottom:20px; color:var(--text-light);">${data.day}, ${new Date().toLocaleDateString()}</p>
                        <div class="stats-grid">
                            ${data.classes.length === 0 ? '<div class="card"><p>No classes scheduled for today.</p></div>' : ''}
                            ${data.classes.map(c => `
                                <div class="stat-box primary">
                                    <div style="opacity:0.8; font-size:0.9rem;">Period ${c.period}</div>
                                    <div style="font-size:1.2rem; font-weight:700; margin:10px 0;">${c.subject}</div>
                                    <div style="font-size:0.85rem;">${c.course} | ${c.room}</div>
                                    <div style="font-size:0.8rem; margin-top:5px;">${c.time}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    document.getElementById('mainContent').innerHTML = `
                        <h1 style="margin-bottom:20px;">Admin Dashboard</h1>
                        <div class="card"><h3>Welcome, Admin</h3><p>Manage university operations efficiently.</p></div>
                    `;
                }
            } else if (page === 'students') {
                document.getElementById('mainContent').innerHTML = `
                    <h1 style="margin-bottom:20px;">Student Records</h1>
                    <div class="card">
                        <div class="form-group">
                            <label class="form-label">Select Course</label>
                            <select id="detailCourse" onchange="viewStudentDetails()">
                                <option value="">-- Select Course --</option>
                                <option value="BCA">BCA</option>
                                <option value="BBA">BBA</option>
                                <option value="BCOM">BCOM</option>
                            </select>
                        </div>
                    </div>
                    <div id="studentDetailContainer"></div>
                `;
            } else if (page === 'attendance') {
                document.getElementById('mainContent').innerHTML = `
                    <h1 style="margin-bottom:20px;">Mark Class Attendance</h1>
                    <div class="card">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            <div class="form-group">
                                <label class="form-label">Course</label>
                                <select id="courseSelect" onchange="loadSubjects()">
                                    <option value="">-- Select --</option>
                                    <option value="BCA">BCA</option>
                                    <option value="BBA">BBA</option>
                                    <option value="BCOM">BCOM</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Subject</label>
                                <select id="subjectSelect"><option value="">Select Course First</option></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date</label>
                                <input type="date" id="attDate" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Period</label>
                                <select id="periodSelect">
                                    <option value="1">Period 1</option>
                                    <option value="2">Period 2</option>
                                    <option value="3">Period 3</option>
                                    <option value="4">Period 4</option>
                                </select>
                            </div>
                        </div>

                        <div class="quick-entry-box">
                            <label class="form-label" style="color:var(--danger);">🚫 Absent Roll Numbers (Comma Separated)</label>
                            <textarea id="absentList" placeholder="e.g.: BCA-01, BCA-05, BCA-09"></textarea>
                            <p style="font-size:0.8rem; color:var(--text-light); margin-top:5px;">Leave empty if all students are present.</p>
                        </div>

                        <div style="display:flex; gap:10px;">
                            <button class="btn-action btn-success" onclick="submitQuickAttendance()">✅ Submit Attendance</button>
                        </div>
                    </div>
                `;
            } else if (page === 'shortage') {
                document.getElementById('mainContent').innerHTML = `
                    <h1 style="margin-bottom:20px;">Attendance Shortage List</h1>
                    <div class="card">
                         <div class="form-group">
                            <label class="form-label">Select Course</label>
                            <select id="shortageCourse" onchange="loadShortageList()">
                                <option value="">-- Select --</option>
                                <option value="BCA">BCA</option>
                                <option value="BBA">BBA</option>
                                <option value="BCOM">BCOM</option>
                            </select>
                        </div>
                    </div>
                    <div id="shortageTableContainer"></div>
                `;
            }
        }

        // --- HELPER FUNCTIONS ---

        async function loadSubjects() {
            const course = document.getElementById('courseSelect').value;
            if (!course) return;
            const res = await fetch(`/api/student/subjects/${course}`);
            const subs = await res.json();
            document.getElementById('subjectSelect').innerHTML = subs.map(s => `<option>${s}</option>`).join('');
        }

        async function viewStudentDetails() {
            const course = document.getElementById('detailCourse').value;
            if (!course) return;
            const res = await fetch(`/api/admin/students/${course}`);
            const students = await res.json();
            
            document.getElementById('studentDetailContainer').innerHTML = `
                <div class="card">
                    <div class="table-container">
                        <table class="att-table">
                            <thead><tr><th>Name</th><th>Roll No</th><th>Mobile</th><th>College Email</th><th>Semester %</th></tr></thead>
                            <tbody>
                                ${students.map(s => `
                                    <tr>
                                        <td>${s.name}</td>
                                        <td>${s.rollNumber}</td>
                                        <td>${s.mobile}</td>
                                        <td>${s.email}</td>
                                        <td>
                                            <span style="font-weight:700; color: ${s.stats.semesterPercentage < 75 ? 'var(--danger)' : 'var(--success)'}">
                                                ${s.stats.semesterPercentage}%
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        async function submitQuickAttendance() {
            const course = document.getElementById('courseSelect').value;
            const subject = document.getElementById('subjectSelect').value;
            const date = document.getElementById('attDate').value;
            const period = parseInt(document.getElementById('periodSelect').value); 
            const absentText = document.getElementById('absentList').value;

            if (!course || !subject || !date || !period) return alert("Please fill all fields.");

            const absentRolls = absentText.split(',')
                                .map(r => r.trim().toUpperCase())
                                .filter(r => r.length > 0);

            const confirmation = confirm(`You are marking:\nSubject: ${subject}\nPeriod: ${period}\nAbsent Count: ${absentRolls.length}\n\nProceed?`);
            if(!confirmation) return;

            const res = await fetch('/api/admin/attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    date, 
                    subject, 
                    courseId: course, 
                    period: period, 
                    absentRollNumbers: absentRolls 
                })
            });
            const data = await res.json();
            alert(data.message);
            document.getElementById('absentList').value = ""; 
        }

        async function loadShortageList() {
            const course = document.getElementById('shortageCourse').value;
            if (!course) return;

            const res = await fetch(`/api/admin/shortage/${course}`);
            const students = await res.json();
            
            const container = document.getElementById('shortageTableContainer');
            if (students.length === 0) {
                container.innerHTML = `<div class="card"><p style="text-align:center; color:var(--success); font-weight:600;">🎉 No shortage in this course!</p></div>`;
                return;
            }

            container.innerHTML = `
                <div class="card">
                    <div class="table-container">
                        <table class="att-table">
                            <thead><tr><th>Name</th><th>Roll No</th><th>Mobile</th><th>Attendance %</th></tr></thead>
                            <tbody>
                                ${students.map(s => `
                                    <tr>
                                        <td>${s.name}</td>
                                        <td>${s.rollNumber}</td>
                                        <td>${s.mobile}</td>
                                        <td><span style="background:#fee2e2; color:#b91c1c; padding:4px 8px; border-radius:4px; font-weight:600;">${s.stats.semesterPercentage}%</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
